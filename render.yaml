services:
  - type: web
    name: youtube-viewer-bot
    env: docker
    region: oregon
    plan: free
    envVars:
      - key: BOT_MODE
        value: LIVE
      - key: STREAM_URL
        value: https://www.youtube.com/watch?v=YOUR_STREAM_ID
      - key: VIDEO_URLS
        value: https://www.youtube.com/watch?v=VIDEO1,https://www.youtube.com/watch?v=VIDEO2
      - key: VIEWER_COUNT
        value: 3
      - key: MAX_DURATION_MINUTES
        value: 0
      - key: RESTART_INTERVAL_HOURS
        value: 4
      - key: PYTHONUNBUFFERED
        value: 1
      - key: DISPLAY
        value: ":99"